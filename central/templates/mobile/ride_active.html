<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ride Active - Giro Bicicleta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='img/logo.jpg') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile/mobile.css') }}" />
</head>
<body>
    <main class="mobile-shell">
        <section class="mobile-card">
            <div class="brand-row">
                <img class="brand-logo" src="{{ url_for('static', filename='img/logo.jpg') }}" alt="Giro Bicicleta" />
                <p class="eyebrow">Viaje activo</p>
            </div>
            <h1>Disfruta tu ruta, {{ customer_name }}</h1>
            <p class="muted">Bicicleta: <strong>{{ rental.bike_id }}</strong></p>
            <p class="muted">Inicio: {{ rental.start_time }}</p>
            <p class="muted">Estado de pago: {{ rental.payment_status }}</p>
            <p class="hint">Devuelve la bicicleta en una estación para finalizar tu viaje.</p>
            <form method="post" action="{{ url_for('mobile_complete_return_page') }}">
                <input type="hidden" name="station_id" value="{{ rental.start_station_id }}" />
                <button type="submit" class="btn btn-primary">Completar retorno en esta estación</button>
            </form>
            <a class="btn btn-ghost" href="{{ url_for('mobile_stations_page') }}">Ver estaciones</a>
            <form method="post" action="{{ url_for('mobile_logout_page') }}">
                <button type="submit" class="btn btn-primary logout-btn">Cerrar sesión</button>
            </form>
        </section>
    </main>
</body>
</html>
