<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Viaje activo - Giro Bicicleta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='img/logo.jpg') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile/mobile.css') }}" />
</head>
<body class="has-chrome">
    {% include "mobile/_chrome.html" %}

    <main class="mobile-shell">
        <div style="display:grid;gap:0.85rem;">

            <div>
                <p class="eyebrow" style="margin-bottom:0.2rem;">Viaje activo</p>
                <h1 style="margin:0;">¡Buen viaje!</h1>
            </div>

            <section class="mobile-card accent-green">
                <div class="profile-row" style="padding:0.35rem 0;">
                    <span class="label">Bicicleta</span>
                    <span class="value">{{ rental.bike_id }}</span>
                </div>
                <div class="profile-row" style="padding:0.35rem 0;">
                    <span class="label">Inicio</span>
                    <span class="value">{{ rental.start_station_id }}</span>
                </div>
                <div class="profile-row" style="padding:0.35rem 0;border-bottom:none;">
                    <span class="label">Hora de salida</span>
                    <span class="value">{{ rental.start_time }}</span>
                </div>
            </section>

            <p class="hint">Devuelve la bici en cualquier estación para finalizar el viaje y registrar el cobro.</p>

            <a class="btn btn-ghost" href="{{ url_for('mobile_stations_page') }}">Ver estaciones</a>

        </div>
    </main>
</body>
</html>
