<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mobile Login - Giro Bicicleta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='img/logo.jpg') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile/mobile.css') }}" />
</head>
<body>
    <main class="mobile-shell">
        <section class="mobile-card">
            <div class="brand-row">
                <img class="brand-logo" src="{{ url_for('static', filename='img/logo.jpg') }}" alt="Giro Bicicleta" />
                <p class="eyebrow">Mobile Web</p>
            </div>
            <h1>Iniciar sesión</h1>

            <form method="post" class="form-grid" novalidate>
                {% if notice_message %}
                    <p class="info-box">{{ notice_message }}</p>
                {% endif %}

                <label for="username">Usuario</label>
                <input id="username" name="username" type="text" value="{{ username_value }}" required />

                <label for="password">Contraseña</label>
                <input id="password" name="password" type="password" required />

                {% if error_message %}
                    <p class="error-box">{{ error_message }}</p>
                {% endif %}

                <button type="submit" class="btn btn-primary">Continuar</button>
            </form>

            <a class="btn btn-ghost" href="{{ url_for('mobile_home_page') }}">Volver</a>
        </section>
    </main>
</body>
</html>
