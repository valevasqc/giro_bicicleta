<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Estaciones - Giro Bicicleta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='img/logo.jpg') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile/mobile.css') }}" />
</head>
<body class="has-chrome">
    {% include "mobile/_chrome.html" %}

    <main class="mobile-shell">
        <div style="display:grid;gap:0.85rem;">

            {% if active_bike_id %}
                <div class="active-ride-banner">
                    <div>
                        <p class="banner-label">Viaje activo</p>
                        <p class="banner-title">{{ active_bike_id }}</p>
                    </div>
                    <a class="banner-btn" href="{{ url_for('mobile_ride_active_page') }}">Ver viaje</a>
                </div>
            {% endif %}

            <h1 style="margin:0;">Estaciones</h1>

            <div class="list-grid">
                {% for station in stations %}
                    <a class="list-item" href="{{ url_for('mobile_station_detail_page', station_id=station.station_id) }}">
                        <p class="item-title">{{ station.name }}</p>
                        <p class="item-sub">{{ station.station_id }}</p>
                    </a>
                {% else %}
                    <p class="empty-box">No hay estaciones registradas.</p>
                {% endfor %}
            </div>

        </div>
    </main>
</body>
</html>
