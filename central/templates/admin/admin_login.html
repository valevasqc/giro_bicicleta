<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - Giro Bicicleta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    />
    <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='img/logo.jpg') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin/admin.css') }}" />
</head>
<body>
    <main class="admin-shell admin-login-shell">
        <section class="panel">
            <div class="brand-row">
                <img class="brand-logo" src="{{ url_for('static', filename='img/logo.jpg') }}" alt="Giro Bicicleta" />
                <p class="eyebrow">Giro Bicicleta</p>
            </div>
            <h1>Admin Login</h1>
            <p class="muted">Ingresa con tu cuenta admin para ver el estado del sistema.</p>

            <form method="post" class="form-grid" novalidate>
                {% if notice_message %}
                    <p class="info-box">{{ notice_message }}</p>
                {% endif %}

                <label for="username">Usuario</label>
                <input
                    id="username"
                    name="username"
                    type="text"
                    autocomplete="username"
                    value="{{ username_value }}"
                    required
                />

                <label for="password">Contraseña</label>
                <input
                    id="password"
                    name="password"
                    type="password"
                    autocomplete="current-password"
                    required
                />

                {% if error_message %}
                    <p class="error-box">{{ error_message }}</p>
                {% endif %}

                <button type="submit" class="btn btn-primary">Entrar al dashboard</button>
            </form>
        </section>
    </main>
</body>
</html>
