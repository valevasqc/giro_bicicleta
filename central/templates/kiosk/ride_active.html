<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Viaje activo - Giro Bicicleta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    />
    <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='img/logo.jpg') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/kiosk/station_flow.css') }}" />
</head>
<body>
    <main class="flow-shell">
        <header class="flow-header">
            <p class="eyebrow">Giro Bicicleta</p>
            <h1>Viaje activo</h1>
            <p class="subtext">{{ station_name }} · {{ station_id }}</p>
        </header>

        <section class="card result-card approved">
            <p class="status-title">Bicicleta {{ bike_id }}</p>
            <p class="status-detail">Tu viaje está activo.</p>
            <p class="status-detail">Devuelve la bicicleta en una estación para finalizar tu viaje.</p>
            <p class="payment-pill">Estado de pago: {{ payment_status }}</p>
        </section>

        <form method="post" action="{{ url_for('station_complete_return') }}" class="form-grid">
            <button type="submit" class="primary-btn">Completar retorno en esta estación</button>
        </form>

        <div class="actions-grid">
            <a class="secondary-btn" href="{{ url_for('station_home') }}">Inicio</a>
            <form method="post" action="{{ url_for('station_logout') }}">
                <button type="submit" class="danger-btn logout-btn">Cerrar sesión</button>
            </form>
        </div>
    </main>
</body>
</html>
