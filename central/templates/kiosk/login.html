<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Giro Bicicleta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    />
    <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='img/logo.jpg') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/kiosk/station_flow.css') }}" />
</head>
<body>
    <main class="flow-shell">
        <header class="flow-header">
            <p class="eyebrow">Giro Bicicleta</p>
            <h1>Iniciar sesión</h1>
            <p class="subtext">Estación {{ station_id }}</p>
        </header>

        <section class="card">
            <form method="post" class="form-grid" novalidate>
                {% if notice_message %}
                    <p class="info-message">{{ notice_message }}</p>
                {% endif %}

                <label for="username">Usuario</label>
                <input
                    id="username"
                    name="username"
                    type="text"
                    autocomplete="username"
                    value="{{ username_value }}"
                    placeholder="Ingresa tu nombre de usuario"
                    required
                />

                <label for="password">Contraseña</label>
                <input
                    id="password"
                    name="password"
                    type="password"
                    autocomplete="current-password"
                    placeholder="Ingresa tu contraseña"
                    required
                />

                {% if error_message %}
                    <p class="error-message">{{ error_message }}</p>
                {% endif %}

                <button type="submit" class="primary-btn">Entrar</button>
            </form>
        </section>

        <a class="secondary-btn" href="{{ url_for('station_home') }}">Volver al inicio</a>
    </main>
</body>
</html>
