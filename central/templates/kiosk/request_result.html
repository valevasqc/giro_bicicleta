<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resultado de solicitud - Giro Bicicleta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    />
    <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='img/logo.jpg') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/kiosk/station_flow.css') }}" />
</head>
<body>
    <main class="flow-shell">
        <header class="flow-header">
            <p class="eyebrow">Giro Bicicleta</p>
            <h1>Solicitud de renta</h1>
            <p class="subtext">{{ user_name }} · Estación {{ station_id }}</p>
        </header>

        <section class="card result-card {% if approved %}approved{% else %}rejected{% endif %}">
            {% if approved %}
                <p class="status-title">Solicitud aprobada</p>
                <p class="status-detail">Bicicleta asignada: <strong>{{ bike_id }}</strong></p>
                <a class="primary-btn" href="{{ url_for('station_payment') }}">Continuar</a>
            {% else %}
                <p class="status-title">No se pudo aprobar la solicitud</p>
                <p class="status-detail">{{ reason_message }}</p>
            {% endif %}
        </section>

        <div class="actions-grid">
            <a class="secondary-btn" href="{{ url_for('station_home') }}">Volver</a>
            <form method="post" action="{{ url_for('station_logout') }}">
                <button type="submit" class="danger-btn logout-btn">Cerrar sesión</button>
            </form>
        </div>
    </main>
</body>
</html>
