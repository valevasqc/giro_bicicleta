<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Procesando — Giro Bicicleta</title>
  <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='img/logo.jpg') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/kiosk/kiosk_v2.css') }}"/>
</head>
<body>
<div class="kv2-canvas fa" id="kv2">
  <div class="waiting-screen">
    <div class="waiting-ring">
      <div class="waiting-pulse"></div>
      <div class="waiting-pulse"></div>
      <div class="waiting-pulse"></div>
      <div class="waiting-spinner"></div>
    </div>
    <div class="waiting-text">
      <div class="waiting-title" id="w-title">Verificando</div>
      <div class="waiting-sub"   id="w-sub">Consultando el estado…</div>
    </div>
  </div>
</div>

<script>
(function(){var c=document.getElementById('kv2');function s(){var sc=Math.min(window.innerWidth/800,window.innerHeight/480);c.style.transform='scale('+sc+')';}s();window.addEventListener('resize',s);})();

(function() {
  var pollUrl     = {{ poll_url | tojson }};
  var resultUrl   = {{ result_url | tojson }};
  var homeUrl     = {{ url_for('kiosk.station_home') | tojson }};
  var loginUrl    = {{ url_for('kiosk.station_login', notice='timeout') | tojson }};
  var kind        = {{ pending_kind | tojson }};
  var timeout     = {{ timeout_seconds }};
  var titleEl     = document.getElementById('w-title');
  var subEl       = document.getElementById('w-sub');

  var labels = {
    login:  { title: 'Verificando cuenta',    sub: 'Consultando el estado de tu cuenta…' },
    return: { title: 'Procesando devolución', sub: 'Registrando retorno en el sistema…' },
    topup:  { title: 'Procesando recarga',    sub: 'Validando código y acreditando saldo…' },
  };
  var lbl = labels[kind] || { title: 'Procesando…', sub: 'Espera un momento…' };
  titleEl.textContent = lbl.title;
  subEl.textContent   = lbl.sub;

  function redirect(url) { window.location.href = url; }

  function poll() {
    fetch(pollUrl, { cache: 'no-store' })
      .then(function(r){ return r.json(); })
      .then(function(data){
        if (!data.pending) {
          if (data.outcome === 'timeout') {
            subEl.textContent = 'Sin respuesta. Intenta de nuevo.';
            var dest = (kind === 'login') ? loginUrl : resultUrl;
            setTimeout(function(){ redirect(dest); }, 2000);
            return;
          }
          redirect(resultUrl);
          return;
        }
        setTimeout(poll, 1000);
      })
      .catch(function(){ setTimeout(poll, 1000); });
  }

  poll();
})();
</script>
</body>
</html>
