<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Desbloqueando — Giro Bicicleta</title>
  <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='img/logo.jpg') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/kiosk/kiosk_v2.css') }}"/>
</head>
<body>
<div class="kv2-canvas fa" id="kv2">
  <div class="unlocking-screen locked" id="unlock-screen">

    <div class="lock-anim" id="lock-wrap">
      <!-- Locked SVG (shown first) -->
      <svg id="lock-locked" width="50" height="60" viewBox="0 0 40 48" fill="none">
        <rect x="6" y="20" width="28" height="22" rx="4" fill="rgba(255,255,255,0.07)" stroke="#c4b8b0" stroke-width="2"/>
        <circle cx="20" cy="31" r="3" fill="#c4b8b0"/>
        <line x1="20" y1="31" x2="20" y2="36" stroke="#c4b8b0" stroke-width="2" stroke-linecap="round"/>
        <path d="M10 20V12a10 10 0 0 1 20 0V20" fill="none" stroke="#c4b8b0" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <!-- Open SVG (hidden first) -->
      <svg id="lock-open" width="50" height="60" viewBox="0 0 40 48" fill="none" style="display:none;">
        <rect x="6" y="20" width="28" height="22" rx="4" fill="rgba(63,103,54,0.25)" stroke="#a3d9a5" stroke-width="2"/>
        <circle cx="20" cy="31" r="3" fill="#a3d9a5"/>
        <line x1="20" y1="31" x2="20" y2="36" stroke="#a3d9a5" stroke-width="2" stroke-linecap="round"/>
        <path d="M10 20V12a10 10 0 0 1 20 0" fill="none" stroke="#a3d9a5" stroke-width="2" stroke-linecap="round"
          style="transform:rotate(-20deg);transform-origin:20px 14px;"/>
      </svg>
    </div>

    <div class="unlock-text">
      <div class="unlock-title" id="unlock-title">Desbloqueando bicicleta…</div>
      <div class="unlock-sub"   id="unlock-sub">Pago autorizado — preparando el andén</div>
    </div>

    <div class="unlock-bar-wrap">
      <div class="unlock-bar" id="unlock-bar" style="width:55%;"></div>
    </div>
  </div>
</div>
<script>
(function(){var c=document.getElementById('kv2');function s(){var sc=Math.min(window.innerWidth/800,window.innerHeight/480);c.style.transform='scale('+sc+')';}s();window.addEventListener('resize',s);})();

var bikeId = {{ bike_id | tojson }};
var nextUrl = {{ url_for('kiosk.station_ready_to_go') | tojson }};

setTimeout(function(){
  // Phase 1: open lock
  var screen = document.getElementById('unlock-screen');
  var wrap   = document.getElementById('lock-wrap');
  var locked = document.getElementById('lock-locked');
  var open   = document.getElementById('lock-open');
  var title  = document.getElementById('unlock-title');
  var sub    = document.getElementById('unlock-sub');
  var bar    = document.getElementById('unlock-bar');

  screen.classList.remove('locked');
  screen.classList.add('open');
  locked.style.display = 'none';
  open.style.display   = 'block';
  wrap.classList.add('bobbing');
  title.textContent = '¡Bicicleta desbloqueada!';
  sub.textContent   = 'Retira la ' + bikeId + ' del andén';
  bar.style.width   = '100%';
}, 1100);

setTimeout(function(){
  window.location.href = nextUrl;
}, 2700);
</script>
</body>
</html>
