<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pago y desbloqueo - Giro Bicicleta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    />
    <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='img/logo.jpg') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/kiosk/station_flow.css') }}" />
</head>
<body>
    <main class="flow-shell">
        <header class="flow-header">
            <p class="eyebrow">Giro Bicicleta</p>
            <h1>Autorización de pago</h1>
            <p class="subtext">{{ user_name }} · {{ station_name }} ({{ station_id }})</p>
        </header>

        <section class="card result-card approved">
            <p class="status-title">Bicicleta seleccionada: {{ bike_id }}</p>
            <p class="status-detail">Autoriza el pago para desbloquear la bicicleta. El cobro simulado final se completa cuando termina el viaje.</p>
        </section>

        <form method="post" id="authorize-form" class="form-grid">
            <button type="submit" id="authorize-btn" class="primary-btn">Autorizar y desbloquear</button>
            <p id="processing-msg" class="processing-message" hidden>Procesando autorización...</p>
        </form>

        <a class="secondary-btn" href="{{ url_for('kiosk.station_rental_request_result') }}">Volver</a>
    </main>

    <script>
        (function () {
            const form = document.getElementById("authorize-form");
            const button = document.getElementById("authorize-btn");
            const message = document.getElementById("processing-msg");

            form.addEventListener("submit", function () {
                button.disabled = true;
                button.textContent = "Autorizando...";
                message.hidden = false;
            });
        })();
    </script>
</body>
</html>
