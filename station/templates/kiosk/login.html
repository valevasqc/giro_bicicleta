<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Login — Giro Bicicleta</title>
  <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='img/logo.jpg') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/kiosk/kiosk_v2.css') }}"/>
</head>
<body>
<div class="kv2-canvas sa" id="kv2">
  <div class="kv2-split">

    <!-- Left panel -->
    <div class="kv2-left">
      <div class="lp-logo">
        <img src="{{ url_for('static', filename='img/logo.jpg') }}" alt="Giro"/>
        <div><div class="lp-name">Giro</div><div class="lp-sub">Bicicleta</div></div>
      </div>
      <div class="lp-station">
        <div class="lp-label">Estación</div>
        <div class="lp-sname">{{ station_id }}</div>
      </div>
      <div class="lp-spacer"></div>
      <div class="lp-steps">
        <div class="lp-steps-hdr">Progreso</div>
        <div class="lp-step">
          <div class="lp-dot active"><span class="lp-step-num">1</span></div>
          <span class="lp-step-txt active">Acceso</span>
        </div>
        <div class="lp-step">
          <div class="lp-dot future"><span class="lp-step-num">2</span></div>
          <span class="lp-step-txt future">Solicitud</span>
        </div>
        <div class="lp-step">
          <div class="lp-dot future"><span class="lp-step-num">3</span></div>
          <span class="lp-step-txt future">Pago</span>
        </div>
        <div class="lp-step">
          <div class="lp-dot future"><span class="lp-step-num">4</span></div>
          <span class="lp-step-txt future">¡Listo!</span>
        </div>
      </div>
    </div>

    <!-- Right pane -->
    <div class="kv2-right" style="padding:26px 28px;gap:4px;">
      <div class="c-eyebrow grn" style="margin-bottom:4px;">Identificación</div>
      <div class="c-title" style="margin-bottom:14px;">Iniciar sesión</div>

      <form method="post" class="login-form" novalidate>
        {% if notice_message %}
          <div class="c-notice">{{ notice_message }}</div>
        {% endif %}

        <div>
          <label class="login-label" for="username">Usuario</label>
          <input class="login-input" id="username" name="username" type="text"
            autocomplete="username" value="{{ username_value }}" placeholder="nombre de usuario" required/>
        </div>
        <div>
          <label class="login-label" for="password">Contraseña</label>
          <input class="login-input" id="password" name="password" type="password"
            autocomplete="current-password" placeholder="••••••••" required/>
        </div>

        {% if error_message %}
          <div class="c-err">{{ error_message }}</div>
        {% endif %}

        <button type="submit" class="login-submit">
          Entrar
          <svg width="15" height="15" viewBox="0 0 20 20" fill="none">
            <path d="M4 10h12M11 5l5 5-5 5" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </form>

      <a class="btn-secondary" href="{{ url_for('kiosk.station_home') }}" style="margin-top:6px;">
        ← Volver al inicio
      </a>
    </div>

  </div>
</div>
<script>
(function(){var c=document.getElementById('kv2');function s(){var sc=Math.min(window.innerWidth/800,window.innerHeight/480);c.style.transform='scale('+sc+')';}s();window.addEventListener('resize',s);})();
</script>
</body>
</html>
